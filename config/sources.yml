settings:
  report_title: "AI 热点雷达"
  report_subtitle: "GitHub Actions 定时抓取，Claude Agent Skill 自动归纳，GitHub Pages 网页化展示"
  timezone: "Asia/Shanghai"
  freshness_hours: 96
  max_items_per_source: 16
  max_total_items: 80
  top_items: 30
  provider: "openai"
  openai_model: "gpt-5.5"
  anthropic_model: "claude-sonnet-4-6"
  keywords:
    - AI
    - Claude
    - Agent
    - Agents
    - OpenAI
    - Anthropic
    - GitHub Actions
    - n8n
    - MCP
    - RSS
    - automation
    - LLM
    - Cursor
    - workflow

sources:
  - id: hn-ai
    name: "Hacker News / AI"
    type: rss
    enabled: true
    url: "https://hnrss.org/newest?q=AI"
    weight: 1.1

  - id: hn-claude
    name: "Hacker News / Claude"
    type: rss
    enabled: true
    url: "https://hnrss.org/newest?q=Claude"
    weight: 1.15

  - id: github-blog-ai
    name: "GitHub Blog / AI"
    type: rss
    enabled: true
    url: "https://github.blog/ai-and-ml/feed/"
    weight: 1.0

  - id: github-ai-repos
    name: "GitHub AI Repos"
    type: github_search
    enabled: true
    url: "https://api.github.com/search/repositories?q=topic:artificial-intelligence+stars:%3E1000&sort=updated&order=desc&per_page=20"
    weight: 1.2

  - id: youtube-ai-explained
    name: "YouTube / AI Explained"
    type: rss
    enabled: true
    url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCNJ1Ymd5yFuUPtn21xtRbbw"
    weight: 1.0

  - id: x-ai-search
    name: "X / AI Search"
    type: twitterapi_search
    enabled: false
    url: "https://api.twitterapi.io/twitter/tweet/advanced_search"
    query: "(AI OR Claude OR agent OR OpenAI OR Anthropic) lang:en min_faves:50"
    api_key_env: "TWITTERAPI_KEY"
    weight: 1.35
