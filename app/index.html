<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 热点雷达</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="../assets/app-icon.svg" alt="" class="app-icon">
        <div>
          <h1>AI 热点雷达</h1>
          <p>云端定时 · 本地查看</p>
        </div>
      </div>

      <div class="status-block">
        <span>最近报告</span>
        <strong id="generatedAt">读取中...</strong>
      </div>

      <div class="status-block">
        <span>分析引擎</span>
        <strong id="analysisStatus">读取中...</strong>
      </div>

      <nav class="actions">
        <button id="refreshButton" class="primary" type="button">刷新报告</button>
        <button id="configButton" type="button">编辑来源</button>
        <button id="externalButton" type="button">外部打开</button>
        <button id="folderButton" type="button">项目文件夹</button>
      </nav>

      <p id="runStatus" class="run-status">就绪</p>
    </aside>

    <main class="report-pane">
      <iframe id="reportFrame" title="AI 热点报告"></iframe>
      <div id="emptyState" class="empty-state">
        <h2>还没有报告</h2>
        <p>点击左侧“刷新报告”，应用会自动抓取信息并生成本地报告。</p>
      </div>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
