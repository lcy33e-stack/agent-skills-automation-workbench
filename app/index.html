<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Skills 自动化工作台</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="../assets/app-icon.svg" alt="" class="app-icon">
        <div>
          <h1>Agent Skills 自动化工作台</h1>
          <p>云端定时运行 · 本地查看结果</p>
        </div>
      </div>

      <div class="status-block">
        <span>最近运行</span>
        <strong id="generatedAt">读取中...</strong>
      </div>

      <div class="status-block">
        <span>分析引擎</span>
        <strong id="analysisStatus">读取中...</strong>
      </div>

      <nav class="actions">
        <button id="refreshButton" class="primary" type="button">运行一次</button>
        <button id="configButton" type="button">编辑任务来源</button>
        <button id="externalButton" type="button">外部打开结果</button>
        <button id="folderButton" type="button">项目文件夹</button>
      </nav>

      <p id="runStatus" class="run-status">就绪</p>
    </aside>

    <main class="report-pane">
      <iframe id="reportFrame" title="Skills 运行结果"></iframe>
      <div id="emptyState" class="empty-state">
        <h2>还没有运行结果</h2>
        <p>点击左侧“运行一次”，应用会按配置抓取来源、执行分析并生成本地报告。</p>
      </div>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
